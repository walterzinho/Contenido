<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSCOGENIA V4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <div class="p-6 max-w-6xl mx-auto" x-data="orquestador()">
        
        <header class="mb-8 border-b border-zinc-800 pb-6">
            <h1 class="text-3xl font-bold text-emerald-500">SYSCOGENIA V4.5</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <input type="password" x-model="apiKey" @input="saveData()" placeholder="Tu API Key de Gemini" class="bg-zinc-900 border border-zinc-700 p-2 rounded w-full">
                <button @click="showPromptEdit = !showPromptEdit" class="bg-zinc-800 text-sm px-4 py-2 rounded">⚙️ Configurar Prompts</button>
            </div>
            <textarea x-model="sourceUrl" @input="saveData()" placeholder="Contexto fuente..." class="w-full mt-4 h-20 bg-zinc-900 border border-zinc-700 p-3 rounded"></textarea>
        </header>

        <div x-show="showPromptEdit" class="bg-zinc-900 p-4 rounded-lg mb-6 border border-emerald-900">
            <h3 class="font-bold mb-2">Editar Prompts</h3>
            <button @click="resetPrompts()" class="text-xs bg-red-900 text-red-200 px-2 py-1 rounded mb-4 hover:bg-red-800">Restaurar Prompts de Fábrica</button>
            <template x-for="(p, i) in prompts" :key="i">
                <div class="mb-4">
                    <label class="text-xs text-emerald-400 font-bold" x-text="phaseTitles[i]"></label>
                    <textarea x-model="prompts[i]" @input="saveData()" class="w-full bg-black p-3 text-sm border border-zinc-700 rounded h-32"></textarea>
                </div>
            </template>
        </div>

        <div class="flex gap-6">
            <nav class="w-64 flex flex-col gap-2">
                <template x-for="(title, i) in phaseTitles" :key="i">
                    <button @click="currentPhase = i" :class="currentPhase === i ? 'bg-emerald-600' : 'bg-zinc-900'" class="p-3 rounded text-left transition" x-text="title"></button>
                </template>
                <button @click="fetchContent(currentPhase)" class="mt-4 bg-amber-600 text-black font-bold p-3 rounded hover:bg-amber-500 transition">Generar Fase</button>
                <button @click="exportToMarkdown()" class="bg-zinc-800 p-3 rounded text-sm hover:bg-zinc-700 transition">Exportar MD</button>
            </nav>

            <main class="flex-grow bg-zinc-900 p-6 rounded-lg min-h-[400px]">
                <div x-show="loading" class="text-emerald-500 animate-bounce">Procesando con IA...</div>
                <div x-show="!loading" x-html="renderMarkdown(contentStore[currentPhase])" class="prose prose-invert max-w-none"></div>
            </main>
        </div>
    </div>

    <script>
        function orquestador() {
            return {
                apiKey: localStorage.getItem('smc_apiKey') || '',
                selectedModel: 'gemini-2.5-flash',
                sourceUrl: localStorage.getItem('smc_sourceUrl') || '',
                currentPhase: 0,
                phaseTitles: ['Fase 1: Radio', 'Fase 2: Articulo SEO', 'Fase 3: Prompt Imágenes', 'Fase 4: Redes Sociales'],
                
                prompts: JSON.parse(localStorage.getItem('smc_prompts')) || [
                    `Rol: Actúa como redactor de Noticias para Radio Senior, experto en construcción de guiones para radio, en el entorno rural colombiano

Objetivo: Crear libreto para noticia de noticiero radial y tres libretos tipo flash Informativo en versiones concisas e independientes para ser locutadas, basándote en: {ctx}

Instrucciones:
Tipo de Redacción: Flash Informativo tipo Nota(tres flashes) y Noticia para noticiero radial
Condición: para los flashes Genera 3 titulares distintos y 3 Cuerpos de nota distintos, para la noticia un titular y un cuerpo de noticia
Duración: Cada flash debe tener una duración no mayor a 2:30 minutos, y la Noticia debe tener una duración máxima de 4 Minutos.
Formato: para el Flash: Versión - Titular - Cuerpo de la Nota, para la Noticia Versión - Titular - Cuerpo de la Noticia
Intención de la Redacción Noticia: debe ser neutra, muy descriptiva, resaltar a los participantes y dar información positiva sobre el tema y contexto, y debe contener la estructura: 1. entrada (introducción llamativa, expresiva y que tenga gancho), 2. Cuerpo (desarrollo) y 3. Cierre (Desenlace)
Intención de la Redacción Flashes: el Flash 1 debe tener una redacción general, el Flash 2 debe tener una redacción con enfoque de “Quien y que” desde lo positivo y el Flash 3 debe tener una redacción Causa y efecto, para que los tres cubran la noticia desde ángulos distintos.
Contenido adicional: Redactar guión de introducción y una salida con respecto al tema de la fuente que sea general, debido a que irían abriendo y cerrando la locución de los tres Flashes.
Contexto del Contenido adicional: 1 - Nombre de la Emisora: Voces Campesinas Punto Co. 2 - Nombre del microprograma: Informativo “Conexión Territorial”.

Estructura Noticia Radial
Titular 1: este debe ser de longitud Corta, de Alto Impacto y con gancho
Cuerpo 1: Redacción concisa y directa. contenido general(recordar que no debe exceder de los 4 Minutos)

Estructura Flashes Informativos:

Entrada General: Guión general con respecto al tema de la nota, muy condensado y que abra los flashes, esta intro es una sola para los tres flashes informativos

FLASH 1
Titular 1: este debe ser de longitud media, de Alto Impacto
Cuerpo 1: Redacción concisa y directa. contenido general.

FLASH 2
Titular 2: este debe ser de longitud media con Enfoque Quién y Que (desde lo positivo) - Cuerpo 2: Redacción alternativa, manteniendo la concisión. breve y directa y hablar de los beneficios o las partes positivas.

FLASH 3
Titular 3: este debe ser de longitud media con Enfoque Causa y efecto (desde lo positivo) - Cuerpo 3: Redacción alternativa, manteniendo lo conciso de la noticia, usar un ángulo diferente.

Salida General: Gión general de cierre con respecto al tema de la fuente, muy condensado y que abra los flashes, esta intro es una sola para los tres flashes informativos.

Que no hacer: 1 - No inventar datos que no estén en el contexto de la Fuente. 2 - Hacer Guiones Cortos de menos de minuto y medio. 3 - Utilizar lenguaje técnico o muy complicado, 4 - Solo generar el guíón literario(libreto) sin indicaciones técnicas como musicalización o tono entre otras solo el texto del flash o de la noticia.`,
                    'Actúa como ComunnEditor SEO. Contexto: {ctx}. Genera un artículo de blog de 500 palabras optimizado para buscadores, con estructura H1, H2, H3 y CTA al final.',
                    'Actúa como Director de Arte. Basado en el contexto {ctx} y el artículo {ref}, genera 3 prompts en español detallados para generación de imágenes en Google Flow. Especifica estilo fotorrealista, iluminación cinematográfica, formato 16:9 y parámetros técnicos.',
                    'Actúa como Community Manager. Contexto: {ctx}. Genera: 1. Post para Facebook (Gancho + CTA). 2. Post para Instagram (Cuerpo + 6 hashtags relevantes).'
                ],
                
                contentStore: JSON.parse(localStorage.getItem('smc_contentStore')) || ['', '', '', ''],
                loading: false,
                showPromptEdit: false,

                saveData() {
                    localStorage.setItem('smc_apiKey', this.apiKey);
                    localStorage.setItem('smc_sourceUrl', this.sourceUrl);
                    localStorage.setItem('smc_contentStore', JSON.stringify(this.contentStore));
                    localStorage.setItem('smc_prompts', JSON.stringify(this.prompts));
                },

                resetPrompts() {
                    localStorage.removeItem('smc_prompts');
                    location.reload();
                },

                getPrompt(i) {
                    let p = this.prompts[i].replace('{ctx}', this.sourceUrl);
                    if (i > 0) p = p.replace('{ref}', this.contentStore[i-1]);
                    return p;
                },

                renderMarkdown(text) {
                    return marked.parse(text || '');
                },

                exportToMarkdown() {
                    let mdContent = '# Informe de Orquestación\n\n' + this.sourceUrl + '\n\n';
                    this.phaseTitles.forEach((t, i) => mdContent += '## ' + t + '\n' + (this.contentStore[i] || '') + '\n\n---\n');
                    const blob = new Blob([mdContent], { type: 'text/markdown' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'informe.md'; a.click();
                },

                async fetchContent(i) {
                    if (!this.apiKey) { alert('API Key requerida'); return; }
                    this.loading = true;
                    try {
                        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + this.selectedModel + ':generateContent?key=' + this.apiKey, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: this.getPrompt(i) }] }] })
                        });
                        const data = await response.json();
                        if(data.candidates && data.candidates[0].content.parts[0].text) {
                            this.contentStore[i] = data.candidates[0].content.parts[0].text;
                            this.saveData();
                        } else {
                            this.contentStore[i] = 'Error: ' + JSON.stringify(data);
                        }
                    } catch (err) { alert('Error: ' + err.message); }
                    this.loading = false;
                }
            }
        }
    </script>
</body>
</html>
