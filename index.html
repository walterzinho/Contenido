<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC | Orquestador V2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen p-4 md:p-8">

    <div x-data="app()" x-init="init()" class="max-w-6xl mx-auto" x-cloak>
        
        <header class="mb-8 border-b border-gray-800 pb-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-green-500">SMC | Orquestador V2.3</h1>
                    <p class="text-gray-400">Flujo actual: <span x-text="phaseTitles[currentPhase]"></span></p>
                </div>
                
                <div class="bg-gray-900 border border-gray-800 p-3 rounded-xl flex flex-wrap gap-3 items-center">
                    <select x-model="config.model" class="bg-gray-950 border border-gray-700 text-sm rounded px-2 py-1 outline-none focus:border-green-500 text-white">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                        <option value="gemini-3.1-flash-image-preview">Nano Banana (3.1)</option>
                        <option value="imagen-4.0-generate-001">Imagen 4.0 Standard</option>
                        <option value="imagen-4.0-ultra-generate-001">Imagen 4.0 Ultra</option>
                        <option value="imagen-4.0-fast-generate-001">Imagen 4.0 Fast</option>
                    </select>
                    <div class="relative flex items-center">
                        <input x-model="config.apiKey" :type="showKey ? 'text' : 'password'" placeholder="API Key..." 
                               class="bg-gray-950 border border-gray-700 text-sm rounded px-2 py-1 w-48 outline-none focus:border-green-500">
                        <button @click="showKey = !showKey" class="ml-2 text-xs text-gray-500">👁️</button>
                    </div>
                    <button @click="saveSettings()" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-sm font-bold transition">Guardar</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl shadow-xl">
                    <h3 class="font-bold text-gray-100 mb-4">⚙️ Contexto Fuente</h3>
                    <textarea x-model="campaign.topic" class="w-full h-32 bg-gray-950 border border-gray-700 p-3 rounded text-sm focus:border-green-500 outline-none" placeholder="Ingresa texto o URL..."></textarea>
                </div>

                <div class="flex flex-col gap-2">
                    <template x-for="i in 4" :key="i">
                        <button @click="currentPhase = i" 
                                :class="currentPhase === i ? 'bg-green-600 text-white' : 'bg-gray-800 text-gray-400'"
                                class="px-4 py-3 rounded-lg text-left font-bold transition border border-gray-700">
                            Fase <span x-text="i"></span>: <span x-text="phaseTitles[i].split(': ')[1]"></span>
                        </button>
                    </template>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-xl flex flex-col min-h-[500px]">
                    <h2 class="text-2xl font-semibold text-green-400 mb-6" x-text="phaseTitles[currentPhase]"></h2>
                    
                    <button @click="generateContent()" class="mb-6 bg-yellow-600 hover:bg-yellow-700 text-black px-6 py-4 rounded-lg font-bold flex items-center justify-center gap-2 shadow-lg w-full text-lg animate-pulse">
                        ⚡ Generar Contenido (Fase <span x-text="currentPhase"></span>)
                    </button>

                    <textarea x-model="contentStore[currentPhase]" 
                              class="flex-grow w-full h-96 bg-gray-950 border border-gray-700 rounded-lg p-4 mb-4 focus:ring-2 focus:ring-green-500 outline-none text-gray-300 font-mono text-sm"
                              placeholder="Aquí aparecerá el contenido generado..."></textarea>

                    <div class="flex justify-between items-center pt-4 border-t border-gray-800">
                        <button @click="exportToNotebookLM()" class="text-green-400 hover:text-white underline text-sm transition">💾 Exportar (.md)</button>
                        <button @click="nextPhase()" class="bg-green-700 hover:bg-green-800 text-white px-8 py-2 rounded font-bold transition">Siguiente Fase →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                currentPhase: 1,
                showKey: false,
                config: { apiKey: '', model: 'gemini-1.5-flash' },
                campaign: { topic: '' },
                phaseTitles: { 1: "Fase 1: Radio", 2: "Fase 2: Locución", 3: "Fase 3: Digital", 4: "Fase 4: Visual" },
                contentStore: { 1: "", 2: "", 3: "", 4: "" },
                
                init() {
                    const saved = localStorage.getItem('smc_config_v2');
                    if (saved) this.config = JSON.parse(saved);
                },
                saveSettings() { 
                    localStorage.setItem('smc_config_v2', JSON.stringify(this.config)); 
                    alert('Configuración Guardada'); 
                },
                nextPhase() { if (this.currentPhase < 4) this.currentPhase++; },
                
                async generateContent() {
                    if(!this.config.apiKey) { alert('⚠️ API Key necesaria.'); return; }
                    this.contentStore[this.currentPhase] = "Conectando con Google AI Studio... Procesando fase " + this.currentPhase + "...";
                    
                    const isImagen = this.config.model.includes('imagen');
                    const url = isImagen 
                        ? `https://generativelanguage.googleapis.com/v1beta/models/${this.config.model}:predict?key=${this.config.apiKey}`
                        : `https://generativelanguage.googleapis.com/v1beta/models/${this.config.model}:generateContent?key=${this.config.apiKey}`;
                    
                    try {
                        const body = isImagen ? 
                            { instances: [{ prompt: `Genera una imagen para: ${this.campaign.topic}. Fase visual: ${this.phaseTitles[this.currentPhase]}` }] } :
                            { contents: [{ parts: [{ text: `Actúa como redactor senior. Fase: ${this.phaseTitles[this.currentPhase]}. Contexto: ${this.campaign.topic}. Genera contenido profesional.` }] }] };

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });
                        
                        const data = await response.json();
                        if(data.error) throw new Error(data.error.message);
                        
                        if (isImagen) {
                            this.contentStore[this.currentPhase] = "Imagen generada (ver consola para URL o datos base64): \n" + JSON.stringify(data.predictions[0], null, 2);
                        } else {
                            this.contentStore[this.currentPhase] = data.candidates[0].content.parts[0].text;
                        }
                    } catch (e) {
                        this.contentStore[this.currentPhase] = "ERROR TÉCNICO: " + e.message;
                        console.error(e);
                    }
                },
                
                exportToNotebookLM() {
                    const md = Object.keys(this.contentStore).map(i => `### ${this.phaseTitles[i]}\n${this.contentStore[i] || 'Pendiente'}\n\n`).join('---\n');
                    const blob = new Blob([md], { type: 'text/markdown' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `SMC_Export_${new Date().getTime()}.md`;
                    a.click();
                }
            }
        }
    </script>
</body>
</html>
