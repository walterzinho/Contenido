<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysCoGenIA V5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <div class="p-6 max-w-6xl mx-auto" x-data="orquestadorData()">
        
        <header class="mb-8 border-b border-zinc-800 pb-6">
            <h1 class="text-3xl font-bold text-emerald-500">SysCoGenIA V5.0</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <input type="password" x-model="apiKey" @input="saveData()" placeholder="Tu API Key de Gemini" class="bg-zinc-900 border border-zinc-700 p-2 rounded w-full">
                <button @click="showPromptEdit = !showPromptEdit" class="bg-zinc-800 text-sm px-4 py-2 rounded">⚙️ Configurar Prompts</button>
            </div>
            <textarea x-model="sourceUrl" @input="saveData()" placeholder="Contexto fuente para Fase 1..." class="w-full mt-4 h-20 bg-zinc-900 border border-zinc-700 p-3 rounded"></textarea>
        </header>

        <div x-show="showPromptEdit" class="bg-zinc-900 p-4 rounded-lg mb-6 border border-emerald-900">
            <h3 class="font-bold mb-2">Editar Prompts</h3>
            <button @click="resetAll()" class="text-xs bg-red-900 text-red-200 px-3 py-1 rounded mb-4 hover:bg-red-800">Restaurar Prompts y Memoria de Fábrica</button>
            <template x-for="(p, i) in prompts" :key="i">
                <div class="mb-2">
                    <label class="text-xs text-emerald-400" x-text="phaseTitles[i]"></label>
                    <textarea x-model="prompts[i]" @input="saveData()" class="w-full bg-black p-2 text-xs border border-zinc-700 h-20"></textarea>
                </div>
            </template>
        </div>

        <div class="flex gap-6">
            <nav class="w-64 flex flex-col gap-2">
                <template x-for="(title, i) in phaseTitles" :key="i">
                    <button @click="currentPhase = i" :class="currentPhase === i ? 'bg-emerald-600' : 'bg-zinc-900'" class="p-3 rounded text-left" x-text="title"></button>
                </template>
                <button @click="fetchContent(currentPhase)" class="mt-4 bg-amber-600 text-black font-bold p-3 rounded">Generar Fase</button>
                <button @click="exportToMarkdown()" class="bg-zinc-800 p-3 rounded text-sm">Exportar MD</button>
            </nav>

            <main class="flex-grow bg-zinc-900 p-6 rounded-lg min-h-[400px]">
                <div x-show="loading" class="text-emerald-500 animate-bounce">Procesando con IA...</div>
                <div x-show="!loading" x-html="contentStore[currentPhase] ? renderMarkdown(contentStore[currentPhase]) : '<p class=\'text-zinc-500\'>Esperando generación de esta fase...</p>'" class="prose prose-invert max-w-none"></div>
            </main>
        </div>
    </div>

    <script>
        function orquestadorData() {
            return {
                apiKey: localStorage.getItem('smc_apiKey') || '',
                sourceUrl: localStorage.getItem('smc_sourceUrl') || '',
                currentPhase: 0,
                phaseTitles: ['Fase 1: Noticia', 'Fase 2: Flashes', 'Fase 3: SEO', 'Fase 4: Imágenes', 'Fase 5: Redes'],
                prompts: JSON.parse(localStorage.getItem('smc_prompts')) || [
                    `Rol: Actúa como redactor de Noticias para Radio Senior, experto en redacción de noticias radiales para entorno rural colombiano. 
Objetivo: Generar una noticia completa basada en: {ctx}. 
Estructura: 1. Entrada (gancho), 2. Cuerpo (desarrollo), 3. Cierre (conclusión). 
Instrucciones: Tono neutro, descriptivo, positivo, máximo 4 minutos de lectura. No inventar datos.`,
                    `Rol: Actúa como redactor de radio. 
Objetivo: Crear 3 libretos tipo Flash Informativo basados en la Noticia: {ref}. 
Formato: Versión, Titular, Cuerpo. 
Intención: Flash 1 (General), Flash 2 (Enfoque positivo Quién/Qué), Flash 3 (Enfoque Causa/Efecto). 
Incluye Intro y Salida general para 'Voces Campesinas Punto Co' - 'Conexión Territorial'.`,
                    'Actúa como Editor SEO. Basado en la noticia: {ref}. Genera un artículo de blog de 500 palabras optimizado para buscadores, con estructura H1, H2, H3 y CTA al final.',
                    'Actúa como Director de Arte. Basado en el artículo SEO: {ref}. Genera 3 prompts detallados para generación de imágenes (fotorrealistas, cinemáticas, 16:9).',
                    'Actúa como Community Manager. Basado en el contenido previo: {ref}. Genera: 1. Post Facebook (Gancho + CTA). 2. Post Instagram (Cuerpo + 6 hashtags).'
                ],
                contentStore: JSON.parse(localStorage.getItem('smc_contentStore')) || ['', '', '', '', ''],
                loading: false,
                showPromptEdit: false,

                saveData() {
                    localStorage.setItem('smc_apiKey', this.apiKey);
                    localStorage.setItem('smc_sourceUrl', this.sourceUrl);
                    localStorage.setItem('smc_contentStore', JSON.stringify(this.contentStore));
                    localStorage.setItem('smc_prompts', JSON.stringify(this.prompts));
                },

                resetAll() {
                    localStorage.removeItem('smc_prompts');
                    localStorage.removeItem('smc_contentStore');
                    location.reload();
                },

                getPrompt(i) {
                    let p = this.prompts[i].replace('{ctx}', this.sourceUrl);
                    if (i > 0) p = p.replace('{ref}', this.contentStore[i-1] || 'Sin contenido previo');
                    return p;
                },

                renderMarkdown(text) {
                    return marked.parse(text);
                },

                exportToMarkdown() {
                    let mdContent = '# Informe de Orquestación\n\n' + this.sourceUrl + '\n\n';
                    this.phaseTitles.forEach((t, i) => mdContent += '## ' + t + '\n' + (this.contentStore[i] || '') + '\n\n---\n');
                    const blob = new Blob([mdContent], { type: 'text/markdown' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'informe.md'; a.click();
                },

                async fetchContent(i) {
                    if (!this.apiKey) { alert('API Key requerida'); return; }
                    this.loading = true;
                    try {
                        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + this.apiKey, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: this.getPrompt(i) }] }] })
                        });
                        const data = await response.json();
                        if(data.candidates) {
                            this.contentStore[i] = data.candidates[0].content.parts[0].text;
                            this.saveData();
                        } else {
                            alert('Error de respuesta: ' + JSON.stringify(data));
                        }
                    } catch (err) { alert('Error: ' + err.message); }
                    this.loading = false;
                }
            }
        }
    </script>
</body>
</html>
