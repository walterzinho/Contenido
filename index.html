<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Evitar caché al máximo -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SMC | Orquestador V2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen p-4 md:p-8">

    <div x-data="app()" x-init="init()" class="max-w-6xl mx-auto" x-cloak>
        <header class="mb-8 border-b border-gray-800 pb-6">
            <h1 class="text-3xl font-bold text-green-500">SMC | Orquestador V2.2 (DEBUG MODE)</h1>
            <p class="text-gray-400">Estado: <span x-text="debugStatus"></span></p>
            
            <div class="mt-4 flex gap-4 items-center bg-gray-900 p-4 rounded-lg">
                <select x-model="config.model" class="bg-gray-950 border border-gray-700 text-white rounded p-2">
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                    <option value="gemini-3.1-flash-image-preview">Nano Banana</option>
                </select>
                <input x-model="config.apiKey" type="password" placeholder="API Key" class="bg-gray-950 border border-gray-700 text-white rounded p-2 w-48">
                <button @click="saveSettings()" class="bg-green-600 px-4 py-2 rounded text-white font-bold">Guardar</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <textarea x-model="campaign.topic" class="w-full h-32 bg-gray-900 p-3 rounded text-sm border border-gray-700" placeholder="Contexto..."></textarea>
                <template x-for="i in 4" :key="i">
                    <button @click="currentPhase = i" :class="currentPhase === i ? 'bg-green-600' : 'bg-gray-800'" class="w-full p-3 rounded text-left font-bold transition">Fase <span x-text="i"></span></button>
                </template>
            </div>
            <div class="lg:col-span-3">
                <div class="bg-gray-900 p-6 rounded-2xl">
                    <h2 class="text-2xl font-bold text-green-400 mb-4" x-text="phaseTitles[currentPhase]"></h2>
                    
                    <button @click="generateContent(currentPhase)" class="w-full bg-yellow-600 hover:bg-yellow-700 text-black font-bold py-4 rounded-lg mb-4">
                        ⚡ Generar Contenido (Fase <span x-text="currentPhase"></span>)
                    </button>

                    <textarea x-model="contentStore[currentPhase]" class="w-full h-80 bg-gray-950 border border-gray-700 p-4 rounded text-gray-300 font-mono text-sm"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                currentPhase: 1,
                debugStatus: 'Listo',
                config: { apiKey: '', model: 'gemini-2.0-flash' },
                campaign: { topic: '' },
                phaseTitles: { 1: "Fase 1: Radio", 2: "Fase 2: Locución", 3: "Fase 3: Digital", 4: "Fase 4: Visual" },
                contentStore: { 1: "", 2: "", 3: "", 4: "" },
                
                init() {
                    const saved = localStorage.getItem('smc_config_v2');
                    if (saved) this.config = JSON.parse(saved);
                    console.log("V2.2 Iniciado correctamente");
                },
                
                saveSettings() { 
                    localStorage.setItem('smc_config_v2', JSON.stringify(this.config)); 
                    alert('Configuración Guardada'); 
                },
                
                async generateContent(phase) {
                    if (!this.config.apiKey) { alert('API Key necesaria'); return; }
                    this.debugStatus = 'Conectando con Google...';
                    this.contentStore[phase] = 'Consultando a Google API...';
                    
                    console.log("DEBUG: Iniciando petición para fase", phase);
                    
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${this.config.model}:generateContent?key=${this.config.apiKey}`;
                    
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Actúa como redactor senior. Genera contenido para la ${this.phaseTitles[phase]} basado en: ${this.campaign.topic}` }] }]
                            })
                        });
                        
                        const data = await response.json();
                        console.log("DEBUG: Respuesta recibida:", data);
                        
                        if (data.error) {
                            this.contentStore[phase] = 'ERROR DETALLADO: ' + JSON.stringify(data.error, null, 2);
                            this.debugStatus = 'Error detectado';
                        } else {
                            this.contentStore[phase] = data.candidates[0].content.parts[0].text;
                            this.debugStatus = 'Éxito';
                        }
                    } catch (e) {
                        console.error("DEBUG: Error crítico:", e);
                        this.contentStore[phase] = 'Error de red: ' + e.message;
                        this.debugStatus = 'Error de red';
                    }
                }
            }
        }
    </script>
</body>
</html>
