<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SMC | Orquestador V3.0 (Memoria y JSON)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .prose { color: #d4d4d8; }
        .prose h1, .prose h2 { color: #10b981; font-weight: bold; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 p-8">
    <div x-data="app()" x-init="init()" class="max-w-6xl mx-auto" x-cloak>
        
        <header class="mb-8 border-b border-zinc-800 pb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-emerald-500">SMC | Orquestador V3.0</h1>
            <div class="flex gap-2">
                <input type="password" id="apiKeyInput" placeholder="Tu API Key" 
                       class="bg-zinc-900 border border-zinc-700 px-3 py-1 rounded text-sm">
               <select id="modelSelector" class="...">
    <option value="gemini-1.5-flash">gemini-1.5-flash</option>
    <option value="gemini-1.5-pro">gemini-1.5-pro</option>
    <option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp</option>
</select>
                <button @click="saveSettings()" class="bg-emerald-600 px-4 py-1 rounded text-sm font-bold">Guardar</button>
            </div>
        </header>

        <div class="grid grid-cols-4 gap-6">
            <div class="col-span-1 space-y-4">
                <textarea id="campaignTopic" class="w-full h-32 bg-zinc-900 p-3 rounded text-sm" placeholder="Contexto fuente..."></textarea>
                <template x-for="i in 4">
                    <button @click="currentPhase = i" :class="currentPhase === i ? 'bg-emerald-600' : 'bg-zinc-900'" class="w-full p-3 rounded text-left font-bold transition">Fase <span x-text="i"></span></button>
                </template>
            </div>

            <div class="col-span-3">
                <button @click="handleGenerate()" :disabled="loading" class="w-full bg-amber-600 p-4 rounded font-bold">
                    <span x-show="!loading">⚡ Ejecutar Orquestación Fase <span x-text="currentPhase"></span></span>
                    <span x-show="loading" class="animate-pulse">Procesando con memoria de contexto...</span>
                </button>
                <div id="contentOutput" class="prose mt-6 p-6 bg-zinc-900 rounded-xl min-h-[400px]" 
                     x-html="marked.parse(contentStore[currentPhase] || '')"></div>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                currentPhase: 1,
                loading: false,
                contentStore: { 1: '', 2: '', 3: '', 4: '' },
                
                init() {
                    const saved = localStorage.getItem('smc_config_v3');
                    if (saved) {
                        const config = JSON.parse(saved);
                        document.getElementById('apiKeyInput').value = config.apiKey || '';
                        document.getElementById('modelSelector').value = config.model || 'gemini-1.5-flash';
                    }
                },

                saveSettings() {
                    const config = {
                        apiKey: document.getElementById('apiKeyInput').value,
                        model: document.getElementById('modelSelector').value
                    };
                    localStorage.setItem('smc_config_v3', JSON.stringify(config));
                    alert("Configuración guardada.");
                },

                async handleGenerate() {
                    this.loading = true;
                    const apiKey = document.getElementById('apiKeyInput').value;
                    const model = document.getElementById('modelSelector').value;
                    const topic = document.getElementById('campaignTopic').value;

                    // Lógica de memoria: incluimos lo generado anteriormente
                    let memory = "";
                    for(let i=1; i<this.currentPhase; i++) {
                        memory += `\nResultado Fase ${i}: ${this.contentStore[i]}`;
                    }

                    const prompt = `Actúa como Editor de Voces Campesinas. Contexto: ${topic}. Memoria: ${memory}. 
                    Genera el contenido de la Fase ${this.currentPhase}. Responde estrictamente en formato Markdown.`;

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });

                        const data = await response.json();
                        const text = data.candidates[0].content.parts[0].text;
                        
                        this.contentStore[this.currentPhase] = text;
                        this.loading = false;
                    } catch (e) {
                        alert("Error de conexión. Revisa tu API Key.");
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
